name: PR CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-checks:
    name: backend-checks
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Encore CLI
        run: curl -L https://encore.dev/install.sh | bash

      - name: Add Encore to PATH
        run: echo "$HOME/.encore/bin" >> "$GITHUB_PATH"

      - name: Tool versions
        run: |
          node --version
          npm --version
          encore version
          docker --version

      - name: Typecheck
        run: npm run typecheck

      - name: Encore tests
        env:
          CI: "true"
        run: encore test
